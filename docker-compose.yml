services:
  backend:
    image: ghcr.io/vinitkumargupta/leetcode-backend:latest
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - MODEL_API_KEY=${MODEL_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: always

  frontend:
    image: ghcr.io/vinitkumargupta/leetcode-frontend:latest
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

